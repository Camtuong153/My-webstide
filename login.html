<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập</title>
    <style>
        body { font-family: sans-serif; background: #f5f7fb; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .card { background: white; padding: 40px; border-radius: 35px; box-shadow: 0 20px 40px rgba(0,0,0,0.05); width: 100%; max-width: 400px; text-align: center; }
        input { width: 100%; padding: 15px; margin: 10px 0; border: 1px solid #e2e8f0; border-radius: 15px; outline: none; }
        .btn { width: 100%; padding: 15px; background: #2563eb; color: white; border: none; border-radius: 15px; font-weight: 600; cursor: pointer; margin-top: 10px; }
        .back { display: block; margin-top: 20px; color: #6b7280; text-decoration: none; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Đăng nhập</h2>
        <p style="color: #6b7280; margin-bottom: 20px;">Chào mừng bạn quay trở lại</p>
        <input type="email" placeholder="Email của bạn" id="email">
        <input type="password" placeholder="Mật khẩu" id="password">
        <button class="btn" id="loginBtn">Đăng nhập</button>
        <a href="register.html" class="back">Chưa có tài khoản? Đăng ký ngay</a>
        <a href="index.html" class="back">← Quay về trang chủ</a>
    </div>

    <script>
        document.getElementById('loginBtn').addEventListener('click', function() {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();

            if (!email || !password) {
                alert('Vui lòng nhập email và mật khẩu.');
                return;
            }

            const user = JSON.parse(localStorage.getItem('user'));
            if (user && user.email === email && user.password === password) {
                alert('Đăng nhập thành công! Chào mừng ' + user.name);
                // In real app, redirect or set session
            } else {
                alert('Email hoặc mật khẩu không đúng.');
            }
        });
    </script>
</body>
</html>
