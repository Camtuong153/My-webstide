<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tạo tài khoản</title>
    <style>
        body { font-family: sans-serif; background: #f5f7fb; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .card { background: white; padding: 40px; border-radius: 35px; box-shadow: 0 20px 40px rgba(0,0,0,0.05); width: 100%; max-width: 400px; text-align: center; }
        input { width: 100%; padding: 15px; margin: 10px 0; border: 1px solid #e2e8f0; border-radius: 15px; }
        .btn { width: 100%; padding: 15px; background: #2563eb; color: white; border: none; border-radius: 15px; font-weight: 600; cursor: pointer; }
        .back { display: block; margin-top: 20px; color: #6b7280; text-decoration: none; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Tạo tài khoản</h2>
        <p style="color: #6b7280; margin-bottom: 20px;">Bắt đầu hành trình của bạn</p>
        <input type="text" placeholder="Họ và tên" id="name">
        <input type="email" placeholder="Email" id="email">
        <input type="password" placeholder="Mật khẩu" id="password">
        <button class="btn" id="registerBtn">Đăng ký</button>
        <a href="login.html" class="back">Đã có tài khoản? Đăng nhập</a>
        <a href="index.html" class="back">← Quay về trang chủ</a>
    </div>

    <script>
        document.getElementById('registerBtn').addEventListener('click', function() {
            const name = document.getElementById('name').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();

            if (!name || !email || !password) {
                alert('Vui lòng điền đầy đủ thông tin.');
                return;
            }

            if (password.length < 6) {
                alert('Mật khẩu phải có ít nhất 6 ký tự.');
                return;
            }

            // Demo: store in localStorage
            localStorage.setItem('user', JSON.stringify({ name, email, password }));
            alert('Đăng ký thành công! Bạn có thể đăng nhập bây giờ.');
            window.location.href = 'login.html';
        });
    </script>
</body>
</html>
